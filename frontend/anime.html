<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="Tonton anime subtitle Indonesia dengan player berkualitas tinggi. Episode terbaru, resolusi hingga 1080p.">
    <title>ZeroStream · Watch Anime</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACQAAAAkCAYAAADhAJiYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAClSURBVFhH7ZgxDoAgDEW5AxN34SwuLs7GkZO7iYMJpAwhpX0WaGmSr0mT9kPLA3/8WFtJKSmlpJSSUkrpDWWgZ+gNeoPeoDfoDXqD3qA3yKnQanSYWXEJERERERG9p+zXHWMZ6Bl6g96gN+gNeoPeoDfoDXqD3qA3yKnQanSYWXEJERERERG9p+zXHWMZ6Bl6g96gN+gN+o+eoBfoBXqBXqA/UJ+67KtSSkopJaWU3pT/BuotCiBJZgAAAABJRU5ErkJggg==">
</head>
<body>
    <header class="site-header" aria-label="Main header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <i class="fas fa-film"></i> ZeroStream
            </a>
            <div class="header-actions">
                <button class="icon-btn settings-icon" id="settings-icon" aria-label="Settings">
                    <i class="fas fa-sliders-h"></i>
                </button>
                <button class="hamburger" id="hamburger-menu" aria-label="Menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Mobile Navigation Drawer -->
    <div id="mobile-nav" class="mobile-nav" hidden>
        <div class="mobile-nav-header">
            <span class="mobile-nav-title">Menu</span>
            <button class="close-nav" id="close-nav-btn"><i class="fas fa-times"></i></button>
        </div>
        <nav class="mobile-nav-links">
            <a href="index.html" class="mobile-nav-link"><i class="fas fa-home"></i> Home</a>
            <button class="mobile-nav-link" id="mobile-bookmarks-link"><i class="fas fa-bookmark"></i> Bookmarks</button>
            <button class="mobile-nav-link" id="mobile-history-link"><i class="fas fa-history"></i> History</button>
        </nav>
    </div>

    <main class="main-content">
        <div class="container detail-page">
            <!-- Anime Detail Section -->
            <div id="anime-info" class="detail-container"></div>

            <!-- Player Section Premium -->
            <div class="player-section">
                <div class="player-header">
                    <h2><i class="fas fa-play-circle"></i> Streaming Player</h2>
                    <div id="resolution-buttons" class="resolution-buttons" aria-label="Video quality"></div>
                </div>
                <div id="player-container" class="player-container" aria-label="Video player">
                    <div class="player-placeholder">
                        <i class="fas fa-tv placeholder-icon"></i>
                        <p>Select an episode to start watching</p>
                    </div>
                </div>
            </div>

            <!-- Episode List dengan Advanced UI -->
            <div class="episodes-section">
                <div class="episodes-header">
                    <h2><i class="fas fa-list-ul"></i> Episodes</h2>
                    <div class="episode-search">
                        <i class="fas fa-search"></i>
                        <input type="text" id="episode-search" placeholder="Cari episode..." aria-label="Search episodes">
                    </div>
                </div>
                <div id="episode-list" class="episode-list" aria-label="Episode list"></div>
            </div>
        </div>
    </main>

    <!-- Settings Panel (sama seperti index) -->
    <div id="settings-panel" class="settings-panel" hidden>
        <div class="settings-header">
            <h3><i class="fas fa-cog"></i> Preferences</h3>
            <button class="close-btn" id="close-settings"><i class="fas fa-times"></i></button>
        </div>
        <div class="settings-body">
            <div class="setting-item">
                <label><i class="fas fa-moon"></i> Theme</label>
                <div class="toggle-buttons">
                    <button data-theme="dark" class="theme-btn">Dark</button>
                    <button data-theme="light" class="theme-btn">Light</button>
                </div>
            </div>
            <div class="setting-item">
                <label><i class="fas fa-video"></i> Default Quality</label>
                <div class="toggle-buttons">
                    <button data-quality="360p">360p</button>
                    <button data-quality="480p">480p</button>
                    <button data-quality="720p">720p</button>
                    <button data-quality="1080p">1080p</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="js/common.js"></script>
    <script src="js/detail.js"></script>
</body>
</html>
